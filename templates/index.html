<!DOCTYPE html>
<html data-theme="dark">
<head>
<title>Stars Outside - Camera Control Panel</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/pico.min.css">
<link rel="stylesheet" href="/static/style.css">
<script defer src="/static/alpine.min.js"></script>
</head>
<body x-data="app()" x-init="init()">
<main class="container-fluid">
  <nav>
    <ul>
      <li><strong class="site-title">✨ Stars Outside &nbsp;|&nbsp; <span class="defcon-label" :class="{'siren': defcon === 'DEFCON 2'}" :style="{color: defconColor}" x-text="defconLabel">CLEAR SKIES</span></strong> <span class="status-bar" x-show="status" x-text="status"></span></li>
    </ul>
    <ul>
      <li x-show="camOn"><button class="cam-toggle-btn refocus-btn" @click="publish()">PUBLISH</button></li>
      <li x-show="camOn"><button class="cam-toggle-btn refocus-btn" @click="cmd('focus')">FOCUS</button></li>
      <li><button class="cam-toggle-btn" :class="(camOn && !camHover) || (!camOn && camHover) ? 'on' : 'off'"
                   @click="camCtl(camOn ? 'stop' : 'start')" :disabled="camLoading"
                   @mouseenter="camHover = true" @mouseleave="camHover = false"
><span x-show="!camLoading" x-text="camHover ? (camOn ? 'TURN OFF' : 'TURN ON') : (camOn ? 'CAMERA ON' : 'CAMERA OFF')"></span><span x-show="camLoading" class="cam-spinner"></span></button></li>
    </ul>
  </nav>

  <div class="main-layout">
    <div class="stream-col">
      <img id="stream" alt="Camera Stream"
           class="stream-img" style="display:none">
      <article x-show="!camOn" class="empty-state">
        <div>
          <p>Sky is clear!</p>
          <button class="outline" @click="camCtl('start')">Take a look</button>
        </div>
      </article>
      <p class="status-text" x-show="camOn && pubStatus" x-text="pubStatus"></p>

      <div class="agg-log-panel">
        <div class="agg-log-header" :style="panels.eventLog ? '' : 'padding-bottom:0;margin-bottom:0'" @click="panels.eventLog = !panels.eventLog">
          <span class="agg-log-title">Event Log <span x-html="panels.eventLog ? '&#9662;' : '&#9656;'"></span></span>
          <div class="agg-log-filters" @click.stop>
            <button class="agg-filter" :class="filters.alerts ? 'active' : ''" @click="filters.alerts = !filters.alerts">Alerts</button>
            <button class="agg-filter" :class="filters.scans ? 'active' : ''" @click="filters.scans = !filters.scans">Scans</button>
            <button class="agg-filter" :class="filters.status ? 'active' : ''" @click="filters.status = !filters.status">Status</button>
            <button class="agg-filter" :class="filters.system ? 'active' : ''" @click="filters.system = !filters.system">System</button>
          </div>
        </div>
        <div x-show="panels.eventLog" class="log-columns-header">
          <span></span>
          <span>Type</span>
          <span>Time</span>
          <span>Details</span>
        </div>
        <div x-show="panels.eventLog" class="log-entries">
          <template x-if="aggLog.length === 0">
            <p><small>No events recorded</small></p>
          </template>
          <template x-for="(e, idx) in aggLog" :key="idx">
            <div class="log-entry" :class="'type-' + e._type" @click="e._open = !e._open">
              <span class="log-type" x-text="e._type"></span>
              <span x-text="e.time || ''" class="log-time"></span>
              <span class="log-content">
                <template x-if="e._type === 'alert'">
                  <span class="log-badge" :class="e.defcon==='DEFCON 2'?'d2':e.defcon==='DEFCON 4'?'d4':'d5'"
                        x-text="e.defcon"></span>
                </template>
                <template x-if="e._type === 'scan'">
                  <span x-text="(e.source || 'scan') + ' (' + (e.result || 'clear') + ')'"></span>
                </template>
                <template x-if="e._type === 'status'">
                  <span x-text="e.message"></span>
                </template>
                <template x-if="e._type === 'system'">
                  <span><span class="log-label" x-text="e.label"></span> <span x-text="e.value"></span></span>
                </template>
                <span x-show="e.source && e._type !== 'scan'" x-text="e.source" class="log-source"></span>
              </span>
              <pre x-show="e._open && (e.raw || e.data)" x-text="e.raw ? JSON.stringify(e.raw, null, 2) : e.data"></pre>
            </div>
          </template>
          <template x-if="eventLog.length < eventTotal">
            <div class="load-more">
              <button class="outline load-more-btn" @click="loadMore()" :disabled="loadingMore"
                      x-text="loadingMore ? 'Loading...' : 'Load More'"></button>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <article>
        <header @click="panels.sysinfo = !panels.sysinfo">
          System <span x-html="panels.sysinfo ? '&#9662;' : '&#9656;'"></span>
        </header>
        <div x-show="panels.sysinfo" class="control-group" style="padding-bottom:10px">
          <div class="sysinfo-section">
            <div class="sysinfo-row">
              <span class="sysinfo-label">Uptime</span>
              <span x-text="sys.uptime"></span>
            </div>
          </div>
          <div class="sysinfo-section">
            <div class="sysinfo-row">
              <span class="sysinfo-label">CPU</span>
              <span class="spark-value"><span x-html="cpuSpark"></span><span :style="{color: cpuColor}" x-text="sys.load"></span></span>
            </div>
          </div>
          <div class="sysinfo-section">
            <div class="sysinfo-row">
              <span class="sysinfo-label">Temp</span>
              <span class="spark-value"><span x-html="tempSpark"></span><span :style="{color: tempColor}" x-text="sys.temp"></span></span>
            </div>
          </div>
          <div class="svc-row" style="margin-top:6px">
            <span class="svc-dot" :class="webRestarting ? 'down' : noPolling ? 'warn' : 'up'"></span>
            <span class="sysinfo-label">Web</span>
            <button class="outline btn-danger svc-restart-btn" @click="restartServer()">Restart</button>
          </div>
          <div class="svc-row">
            <span class="svc-dot" :class="sys.dbOk ? 'up' : 'down'"></span>
            <span class="sysinfo-label">DB <small x-text="'(' + sys.dbSize + ')'" style="opacity:0.6"></small></span>
            <button class="outline btn-danger svc-restart-btn" @click="dbReset()">Reset</button>
          </div>
          <div x-html="servicesRows"></div>
        </div>
      </article>

      <article>
        <header @click="panels.image = !panels.image">
          Camera <span x-html="panels.image ? '&#9662;' : '&#9656;'"></span>
        </header>
        <div x-show="panels.image" :class="{'controls-disabled': !camOn}" class="settings-panel">
          <div class="setting-row">
            <span class="sysinfo-label">Mode</span>
            <div role="group">
              <template x-for="m in ['day','night']">
                <button :class="active.mode === m ? '' : 'outline'"
                        @click="cmd(m)" x-text="m[0].toUpperCase() + m.slice(1)"></button>
              </template>
            </div>
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">Resolution</span>
            <div role="group">
              <template x-for="r in [{val:'low',label:'480p'},{val:'mid',label:'720p'},{val:'high',label:'1080p'}]">
                <button :class="active.res === r.val ? '' : 'outline'"
                        @click="cmd('res ' + r.val)" x-text="r.label"></button>
              </template>
            </div>
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">FPS</span>
            <div role="group">
              <template x-for="f in ['5','10','15','24','30']">
                <button :class="active.fps === f ? '' : 'outline'"
                        @click="cmd('fps ' + f)" x-text="f"></button>
              </template>
            </div>
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">Brightness <small x-text="bright"></small></span>
            <input type="range" min="0" max="100" x-model="bright"
                   @change="cmd('bright ' + bright)">
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">Rotation</span>
            <div role="group">
              <template x-for="r in ['0','90','180','270']">
                <button :class="active.rotation === r ? '' : 'outline'"
                        @click="cmd('rotate ' + r)" x-html="r + '&deg;'"></button>
              </template>
            </div>
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">Zoom <small x-text="zoom"></small></span>
            <input type="range" min="100" max="500" step="10" x-model="zoom"
                   @change="cmd('zoom ' + zoom)">
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">Filters</span>
            <div role="group">
              <button :class="active.grayscale ? '' : 'outline'"
                      @click="toggleGrayscale()">Grayscale</button>
              <button :class="active.invert ? '' : 'outline'"
                      @click="toggleInvert()">Invert</button>
            </div>
          </div>
        </div>
      </article>

      <article>
        <header @click="panels.publish = !panels.publish">
          Channels <span x-html="panels.publish ? '&#9662;' : '&#9656;'"></span>
        </header>
        <div x-show="panels.publish" class="settings-panel">
          <div class="setting-row">
            <span class="sysinfo-label">Telegram</span>
            <input type="checkbox" x-model="pubTelegram">
          </div>
          <div class="setting-row">
            <span class="sysinfo-label">Twitter</span>
            <input type="checkbox" x-model="pubTwitter">
          </div>
        </div>
      </article>

    </div>
  </div>
</main>
<footer class="site-footer">Coded under fire by Tomer Lichtash</footer>
<script src="/static/app.js"></script>
</body>
</html>
