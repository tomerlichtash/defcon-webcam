<!DOCTYPE html>
<html data-theme="dark">
<head>
<title>Stars Outside - Admin</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Secular+One&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- Shoelace theme -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/themes/dark.css">
<!-- Styles: theme tokens → resets → layout → admin -->
<link rel="stylesheet" href="/static/styles/theme.css">
<link rel="stylesheet" href="/static/styles/base.css">
<link rel="stylesheet" href="/static/styles/keyframes.css">
<link rel="stylesheet" href="/static/styles/style.css">
<link rel="stylesheet" href="/static/styles/admin.css">
<!-- Import map for ES modules -->
<script type="importmap">
{
  "imports": {
    "lit": "https://esm.sh/lit@3.2.1?bundle",
    "lit/": "https://esm.sh/lit@3.2.1&bundle/",
    "@reduxjs/toolkit": "https://esm.sh/@reduxjs/toolkit@2.5.0?bundle"
  }
}
</script>
<!-- Shoelace components (cherry-picked, registered globally for shadow DOM use) -->
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/details/details.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/button/button.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/button-group/button-group.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/switch/switch.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/range/range.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/badge/badge.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/input/input.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/drawer/drawer.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.1/cdn/components/icon-button/icon-button.js"></script>
{{GA_SNIPPET}}
</head>
<body data-page="admin">
<main class="container-fluid">
  <top-bar admin></top-bar>

  <div class="main-layout">
    <div class="stream-col">
      <div class="map-container">
        <div id="leaflet-map"></div>
      </div>
    </div>
  </div>
</main>

<sl-drawer id="sidebar-drawer" no-header placement="start">
  <!-- System Info -->
  <sidebar-panel name="sysinfo" title-key="system">
    <sysinfo-content></sysinfo-content>
  </sidebar-panel>

  <!-- Camera Controls -->
  <sidebar-panel name="image" title-key="camera">
    <camera-content></camera-content>
  </sidebar-panel>

  <!-- Channels (simple — Shoelace switches slotted directly) -->
  <sidebar-panel name="publish" title-key="channels">
    <div class="settings-panel">
      <div class="setting-row">
        <span class="sysinfo-label" data-i18n="telegram">Telegram</span>
        <sl-switch id="pub-telegram"></sl-switch>
      </div>
      <div class="setting-row">
        <span class="sysinfo-label" data-i18n="twitter">Twitter</span>
        <sl-switch id="pub-twitter"></sl-switch>
      </div>
    </div>
  </sidebar-panel>

  <!-- Event Log -->
  <sidebar-panel name="eventLog" title-key="event_log">
    <eventlog-content></eventlog-content>
  </sidebar-panel>

  <!-- Admin -->
  <sidebar-panel name="admin" title-key="admin">
    <admin-content></admin-content>
  </sidebar-panel>
</sl-drawer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
<script type="module" src="/static/js/app.js"></script>
</body>
</html>
